version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: scraping_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scraper
    restart: "no"
    env_file: .env
    environment:
      DB_HOST: postgres
    command: python scraping.py
    volumes:
      - scraped_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  loader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: loader
    restart: "no"
    env_file: .env
    environment:
      DB_HOST: postgres
    command: python load_to_db.py
    volumes:
      - scraped_data:/app/data
    depends_on:
      scraper:
        condition: service_completed_successfully

  dbt:
    build:
      context: .
      dockerfile: Dockerfile.dbt
    container_name: dbt
    restart: "no"
    env_file: .env
    environment:
      DB_HOST: postgres
    command: sh -c "dbt run && dbt test"
    depends_on:
      loader:
        condition: service_completed_successfully

volumes:
  postgres_data:
  scraped_data:
