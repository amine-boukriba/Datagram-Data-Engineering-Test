version: 2

models:
  - name: product
    description: "Deduplicated product dimension"
    columns:
      - name: id
        tests: [unique, not_null]
      - name: name
        tests: [not_null]
      - name: brand
        tests: [not_null]

  - name: ranking
    description: "Product ranking with historical max rank"
    columns:
      - name: id
        tests: [unique, not_null]
      - name: product_id
        tests:
          - not_null
          - relationships:
              to: ref('product')
              field: id
      - name: rank
        tests: [not_null]
      - name: max_rank
        tests: [not_null]

  - name: price
    description: "Product pricing with discount calculation"
    columns:
      - name: id
        tests: [unique, not_null]
      - name: product_id
        tests:
          - not_null
          - relationships:
              to: ref('product')
              field: id
      - name: price
        tests: [not_null]